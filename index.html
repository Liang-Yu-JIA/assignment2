<!DOCTYPE html>
<html>
<head>
    <title>Icon Template Square</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.0/buzz.min.js"></script>

    <style>
        .row {
            width: 720px;
            margin: 10px auto;
        }

        .image-container {
            display: table-cell;
            vertical-align: middle;
            padding: 20px;
        }

        .image-container img {
            transition: 0.2s;
            cursor: pointer;
        }

        .image-container img:hover {
            transform: scale(1.08);
        }

        .image-container img:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="row">
        <div class="image-container">
            <img id="img1" src="img/1.png" width="250" height="200"
                 onmouseover="this.src='img/1b.png';"
                 onmouseout="this.src='img/1.png';">
        </div>

        <div class="image-container">
            <img id="img2" src="img/2.png" width="180" height="200"
                 onmouseover="this.src='img/2b.png';"
                 onmouseout="this.src='img/2.png';">
        </div>

        <div class="image-container">
            <img id="img3" src="img/3.png" width="200" height="200"
                 onmouseover="this.src='img/3c.png';"
                 onmouseout="this.src='img/3.png';">
        </div>
    </div>

    <div class="row">
        <div class="image-container">
            <img id="img4" src="img/4.png" width="400" height="180"
                 onmouseover="this.src='img/4b.png';"
                 onmouseout="this.src='img/4.png';">
        </div>

        <div class="image-container">
            <img id="img5" src="img/5.png" width="240" height="200"
        
                 onmouseover="this.src='img/5b.png';"
                 onmouseout="this.src='img/5.png';">
        </div>

        <div class="image-container">
            <img id="img6" src="img/6.png" width="200" height="200"
                 onmouseover="this.src='img/6b.png';"
                 onmouseout="this.src='img/6.png';">
        </div>
    </div>

    <div class="row">
        <div class="image-container">
            <img id="img7" src="img/7.png" width="180" height="200"
                 onmouseover="this.src='img/7b.png';"
                 onmouseout="this.src='img/7.png';">
        </div>

        <div class="image-container">
            <img id="img8" src="img/8.png" width="250" height="200"
                 onmouseover="this.src='img/8b.png';"
                 onmouseout="this.src='img/8.png';">
        </div>

        <div class="image-container">
            <img id="img9" src="img/9.png" width="200" height="200"
                 onmouseover="this.src='img/9b.png';"
                 onmouseout="this.src='img/9.png';">
        </div>
    </div>

    <script>
        var sound1 = new buzz.sound("sound/up.mp3");
        var sound2 = new buzz.sound("sound/plant.mp3");
        var sound3 = new buzz.sound("sound/pop.mp3");
        var sound4 = new buzz.sound("sound/crack.mp3");
        var sound5 = new buzz.sound("sound/woosh.mp3");
        var sound6 = new buzz.sound("sound/build.mp3");
        var sound7 = new buzz.sound("sound/ding.mp3");
        var sound8 = new buzz.sound("sound/flapping.mp3");
        var sound9 = new buzz.sound("sound/harp.mp3");

        window.onload = function() {
            document.getElementById('img1').addEventListener('click', function() { sound1.play(); });
            document.getElementById('img2').addEventListener('click', function() { sound2.play(); });
            document.getElementById('img3').addEventListener('click', function() { sound3.play(); });
            document.getElementById('img4').addEventListener('click', function() { sound4.play(); });
            document.getElementById('img5').addEventListener('click', function() { sound5.play(); });
            document.getElementById('img6').addEventListener('click', function() { sound6.play(); });
            document.getElementById('img7').addEventListener('click', function() { sound7.play(); });
            document.getElementById('img8').addEventListener('click', function() { sound8.play(); });
            document.getElementById('img9').addEventListener('click', function() { sound9.play(); });
        }
    </script>

</body>
</html>
